<!DOCTYPE html>
<html>
<head>
    <title>Available Jobs</title>
    <link rel="stylesheet" href="stylesheet.css">
</head>
<body>

    <header>
        <h2>Job Search Website</h2>

        <nav>
            <a href="Index.html">Home</a> |
            <a href="AppliedJobs.html">My Applications</a> |
            <a href="Home.html">Logout</a>

        </nav>

    </header>

    <div class="main-content">
        <form class="search-form" action="Link">
            <input type="search" id="search" name="search" placeholder="Search For Jobs...">
            <button type="submit">Search</button>
        </form>


        <div class="cards">

            <div class="card">

                <div class="card-top">
                    <div>
                        <h5 class="card-title">Job Title</h5>
                        <p class="card-text">Company Name</p>
                        <p class="card-text">Location</p>
                    </div>
                    <span class="badge open">Open</span>
                </div>

                <hr>

                <div class="card-details">
                    <div>
                        <small>Job ID</small>
                        <p>1</p>
                    </div>
                    <div>
                        <small>Salary</small>
                        <p>10,000 EGP</p>
                    </div>
                    <div>
                        <small>Experience</small>
                        <p>2 years</p>
                    </div>
                </div>

                <hr>

                <div class="card-actions">
                    <a href="JobDetails.html">View Details</a>
                    <button type="button" onclick="applyForJob(this)">Apply</button>
                </div>

            </div>
            <div class="card">

                <div class="card-top">
                    <div>
                        <h5 class="card-title">Job Title</h5>
                        <p class="card-text">Company Name</p>
                        <p class="card-text">Location</p>
                    </div>
                    <span class="badge closed">Closed</span>
                </div>

                <hr>

                <div class="card-details">
                    <div>
                        <small>Job ID</small>
                        <p>2</p>
                    </div>
                    <div>
                        <small>Salary</small>
                        <p>18,000 EGP</p>
                    </div>
                    <div>
                        <small>Experience</small>
                        <p>5 years</p>
                    </div>
                </div>

                <hr>

                <div class="card-actions">
                    <a href="JobDetails.html">View Details</a>
                    <button type="button" onclick="applyForJob(1)">Apply</button>
                </div>

            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>

</html>
