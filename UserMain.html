<!DOCTYPE html>
<html>
<head>
    <title>Available Jobs</title>
    <link rel="stylesheet" href="UserMain.css" />
</head>
<body>

    <h1>Job Search Website</h1>
    <p id="topp">

        <a href="Index.html">Home</a> |
        <a href="AppliedJobs.html">My Applications</a> |

        <a href="Home.html">Logout</a>
    </p>
    <hr>
    <form action="Link">
        <label for="search">Search For Jobs:</label>
        <input type="search" placeholder="EX: Web developer..." id="search" name="search">
        <button type="submit">Search</button>
    </form>


    <h2>List of Available Jobs</h2>

    <h3>Here you can browse and apply for open job opportunities.</h3>

    <table>
        <tr>
            <th>ID</th>
            <th>Job Title</th>
            <th>Company Name</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>

        <tr>
            <td>1</td>
            <td><strong>Software Engineer</strong></td>
            <td>Google</td>
            <td style="color: green">Open</td>

            <td>
                <a href="JobDetails.html">View Details</a> |
                <button type="button" onclick="applyForJob(1)">Apply</button>
            </td>
        </tr>

        <tr>
            <td>2</td>
            <td><strong>Data Analyst</strong></td>
            <td>Vodafone</td>
            <td style="color: red">closed</td>

            <td>
                <a href="JobDetails.html">View Details</a> |
                <button type="button" onclick="applyForJob(1)">Apply</button>
            </td>
        </tr>
    </table>

</body>
</html>
