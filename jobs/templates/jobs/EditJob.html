<!DOCTYPE html>
<html>

<head>
    <title>Edit Job</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'stylesheet.css' %}">
</head>

<body>
    <div class="main-content">
        <div class="centered-form">

            <h2>Edit Job Details</h2>
            <hr>

            <form method="POST">
                {% csrf_token %}

                <label for="jobTitle">Job Title:</label><br>
                <input type="text" id="jobTitle" name="jobTitle" placeholder="enter the job title..."><br><br>

                <label for="companyName">Company Name:</label><br>
                <input type="text" id="companyName" name="companyName" placeholder="enter the company name..."><br><br>

                <label for="salary">Salary:</label><br>
                <input type="text" id="salary" name="salary" placeholder="enter the salary..."><br><br>

                <label for="experience">Experience:</label><br>
                <input type="text" id="experience" name="experience" placeholder="enter the experience..."><br><br>

                <label for="location">Location:</label><br>
                <input type="text" id="location" name="location" placeholder="enter the location..."><br><br>
                <label for="status">Status:</label><br>
                <select id="status" name="status">
                    <option value="Open">Open</option>
                    <option value="Closed">Closed</option>
                </select><br><br>

                <label for="description">Description:</label><br>
                <textarea id="description" name="description" rows="4" cols="50"
                    placeholder="enter the job description..."></textarea><br><br>

                <button type="button" id="saveBtn">Save Changes</button>
                <a href="{% url 'admin_main' %}">Cancel</a>
            </form>
            <script>
                const params = new URLSearchParams(window.location.search);
                const jobId = params.get("id");

                function getCookie(name) {
                    let cookieValue = null;
                    if (document.cookie && document.cookie !== '') {
                        const cookies = document.cookie.split(';');
                        for (let i = 0; i < cookies.length; i++) {
                            const cookie = cookies[i].trim();
                            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                                break;
                            }
                        }
                    }
                    return cookieValue;
                }

                if (jobId) {
                    fetch(`/api/job/?id=${jobId}`)
                        .then(response => response.json())
                        .then(data => {
                            document.getElementById("jobTitle").value = data.jobTitle;
                            document.getElementById("companyName").value = data.companyName;
                            document.getElementById("salary").value = data.salary;
                            document.getElementById("experience").value = data.experience;
                            document.getElementById("location").value = data.location;
                            document.getElementById("status").value = data.status;
                            document.getElementById("description").value = data.description;
                        });
                }

                document.getElementById("saveBtn").onclick = function (e) {
                    e.preventDefault();

                    const updatedData = {
                        jobId: jobId,
                        jobTitle: document.getElementById("jobTitle").value.trim(),
                        companyName: document.getElementById("companyName").value.trim(),
                        salary: document.getElementById("salary").value.trim(),
                        experience: document.getElementById("experience").value.trim(),
                        location: document.getElementById("location").value.trim(),
                        status: document.getElementById("status").value,
                        description: document.getElementById("description").value.trim(),
                    };

                    fetch('/api/update-job/', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-CSRFToken': getCookie('csrftoken')
                        },
                        body: JSON.stringify(updatedData)
                    })
                        .then(response => response.json())
                        .then(data => {
                            if (data.success) {
                                alert("Job updated successfully!");
                                window.location.href = "{% url 'admin_main' %}";
                            } else {
                                alert("Error: " + data.error);
                            }
                        });
                };
            </script>
        </div>
    </div>
</body>

</html>
