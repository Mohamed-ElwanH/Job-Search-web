<!DOCTYPE html>
<html>
<head>
    <title>Edit Job</title>
{% load static %}
<link rel="stylesheet" href="{% static 'stylesheet.css' %}"></head>

<body>
    <div class="main-content">
        <div class="centered-form">

    <h2>Edit Job Details</h2>
    <hr>

   <form method="POST">
{% csrf_token %}

        <label for="jobTitle">Job Title:</label><br>
        <input type="text" id="jobTitle" name="jobTitle" placeholder="enter the job title..."><br><br>

        <label for="companyName">Company Name:</label><br>
        <input type="text" id="companyName" name="companyName" placeholder="enter the company name..."><br><br>

        <label for="salary">Salary:</label><br>
        <input type="text" id="salary" name="salary" placeholder="enter the salary..."><br><br>

        <label for="experience">Experience:</label><br>
        <input type="text" id="experience" name="experience" placeholder="enter the experience..."><br><br>

        <label for="location">Location:</label><br>
        <input type="text" id="location" name="location" placeholder="enter the location..."><br><br>
        <label for="status">Status:</label><br>
        <select id="status" name="status">
            <option value="Open">Open</option>
            <option value="Closed">Closed</option>
        </select><br><br>

        <label for="description">Description:</label><br>
        <textarea id="description" name="description" rows="4" cols="50" placeholder="enter the job description..."></textarea><br><br>

        <button type="button" id="saveBtn">Save Changes</button>
<a href="{% url 'admin_main' %}">Cancel</a>
    </form>
    <script>
    const params = new URLSearchParams(window.location.search);
    const jobId = params.get("id");
    const jobs = JSON.parse(localStorage.getItem("jobs") || "[]");
    const jobIndex = jobs.findIndex(j => j.jobId === jobId);

    if (jobIndex !== -1) {
        const job = jobs[jobIndex];
        document.getElementById("jobTitle").value = job.jobTitle;
        document.getElementById("companyName").value = job.companyName;
        document.getElementById("salary").value = job.salary;
        document.getElementById("experience").value = job.experience;
        document.getElementById("location").value = job.location || "";
        document.getElementById("status").value = job.status;
        document.getElementById("description").value = job.description;
    }

    document.getElementById("saveBtn").onclick = function (e) {
        e.preventDefault();
        if (jobIndex === -1) return;
        jobs[jobIndex] = {
            ...jobs[jobIndex],
            jobTitle: document.getElementById("jobTitle").value.trim(),
            companyName: document.getElementById("companyName").value.trim(),
            salary: document.getElementById("salary").value.trim(),
            experience: document.getElementById("experience").value.trim(),
            location: document.getElementById("location").value.trim(),
            status: document.getElementById("status").value,
            description: document.getElementById("description").value.trim(),
        };
        localStorage.setItem("jobs", JSON.stringify(jobs));
        alert("Job updated successfully!");
        window.location.href = "{% url 'admin_main' %}";
    };
</script>
</div>
</div>
</body>
</html>
