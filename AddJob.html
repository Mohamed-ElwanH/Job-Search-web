<!DOCTYPE html>
<html>
<head>
    <title>Add jobs</title>
</head>
<body>
    <h1>Add a job</h1>
    <h2>Here you can add a new job.</h2>
   
    <ul>
        <li style="font-size: 20px;">Job Title:</li>  <input type="jobTitle" id="jobTitle" name="jobTitle">
        <li style="font-size: 20px;">Job Id:</li>         <input type="id" id="id" name="id">
        <li style="font-size: 20px;">Company name:</li> <input type="companyName" id="companyName" name="companyName">
        <li style="font-size: 20px;">Job Salary:</li>     <input type="salary" id="salary" name="salary">
        <li style="font-size: 20px;">Years of experience:</li> <input type="experience" id="experience" name="experience">
        <li style="font-size: 20px;">Job Status:</li> <label><input type="radio"  name="status" value = "Open"> Open </label>  <label><input type="radio"  name="status" value = "Close"> Close </label>
        <li style="font-size: 20px;">Job Description: </li> <input type="description" id="description" name="description">
</li>
    </ul>
         <button type="submit" id="submitBtn">Submit</button>
</body>
<script src = "JobDetails.js"></script>

</html>
