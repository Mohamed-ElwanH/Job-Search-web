<!DOCTYPE html>
<html>
<head>
    <title>Add jobs</title>
    <link rel="stylesheet" href="stylesheet.css">
</head>
<body>
    <div class="main-content">
        <div class="centered-form">
            <h1 style="text-align:center;">Add a job</h1>
            <form action="/submit" method="post">

                <label for="jobTitle">Job Title:</label><br>
                <input type="text" id="jobTitle" name="jobTitle"><br><br>

                <label for="id">Job ID:</label><br>
                <input type="text" id="id" name="id"><br><br>

                <label for="companyName">Company Name:</label><br>
                <input type="text" id="companyName" name="companyName"><br><br>

                <label for="salary">Job Salary:</label><br>
                <input type="text" id="salary" name="salary"><br><br>

                <label for="experience">Years of Experience:</label><br>
                <input type="text" id="experience" name="experience"><br><br>

                <label for="location">Location:</label><br>
                <input type="text" id="location" name="location"><br><br>

                <label>Job Status:</label><br>
                <label><input type="radio" name="status" value="Open"> Open</label>
                <label><input type="radio" name="status" value="Close"> Close</label><br><br>

                <label for="description">Job Description:</label><br>
                <input type="text" id="description" name="description"><br><br>

                <button type="submit">Submit</button>
            </form>
        </div>
    </div>
</body>
</html>
