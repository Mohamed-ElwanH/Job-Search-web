<!DOCTYPE html>
<html>
<head>
    <title>Edit Job</title>
</head>
<body>

    <h2 style="color: rgb(58, 167, 171);">Edit Job Details</h2>
    <hr>

    <form action="AdminMain.html" method="get">

        <label for="jobTitle">Job Title:</label><br>
        <input type="text" id="jobTitle" name="jobTitle" placeholder="enter the job title..."><br><br>

        <label for="companyName">Company Name:</label><br>
        <input type="text" id="companyName" name="companyName" placeholder="enter the company name..."><br><br>

        <label for="salary">Salary:</label><br>
        <input type="text" id="salary" name="salary" placeholder="enter the salary..."><br><br>

        <label for="experience">Experience:</label><br>
        <input type="text" id="experience" name="experience" placeholder="enter the experience..."><br><br>

        <label for="status">Status:</label><br>
        <select id="status" name="status">
            <option value="Open">Open</option>
            <option value="Closed">Closed</option>
        </select><br><br>

        <label for="description">Description:</label><br>
        <textarea id="description" name="description" rows="4" cols="50" placeholder="enter the job description..."></textarea><br><br>

        <input type="submit" value="Save">
        <a href="AdminMain.html">Cancel</a>

    </form>

</body>
</html>
