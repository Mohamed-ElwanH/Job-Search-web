<!DOCTYPE html>
<html>
<head>
    <title>Edit Job</title>
</head>
<body>

    <h2 style="color: cadetblue;">Edit Job Details</h2>
    <hr>

    <form action="AdminMain.html" method="get">

        <label for="jobTitle">Job Title:</label><br>
        <input type="text" id="jobTitle" name="jobTitle" value="Front-End Developer"><br><br>

        <label for="companyName">Company Name:</label><br>
        <input type="text" id="companyName" name="companyName" value="siemens"><br><br>

        <label for="salary">Salary:</label><br>
        <input type="text" id="salary" name="salary" value="18,000 EGP"><br><br>

        <label for="experience">Experience:</label><br>
        <input type="text" id="experience" name="experience" value="2 Years"><br><br>

        <label for="status">Status:</label><br>
        <select id="status" name="status">
            <option value="Open">Open</option>
            <option value="Closed">Closed</option>
        </select><br><br>

        <label for="description">Description:</label><br>
        <textarea id="description" name="description" rows="4" cols="50">Building web interfaces.</textarea><br><br>

        <input type="submit" value="Save">
        <a href="AdminMain.html">Cancel</a>

    </form>

</body>
</html>
