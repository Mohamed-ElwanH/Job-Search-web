<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>SIGN-UP PAGE!</title>
</head>
<body>
    <p>Welcome to the SIGN-UP PAGE!</p>
    <p> Here you can create an account to access our services.</p>
    <p> Please fill in the form below to get started:</p>
    <form action="LOG_IN.html" method="get">
        <label for="username">Username:</label><br>
        <input type="text" id="username" name="username"><br><br>
        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email"><br><br>
        <label for="password">Password:</label><br>
        <input type="password" id="password" name="password"><br><br>
        <label for="confirm_password">Confirm Password:</label><br>
        <input type="password" id="confirm_password" name="confirm_password"><br><br>
        <lable for="is_admin">Admin?</lable>
        <input type="checkbox" id="is_admin" name="is_admin"><br><br>
        <input type="submit" value="Sign Up">
    </form>
    <p>Already have an account? <a href="LOG_IN.html">Log in here</a>.</p>
</body>
</html>
